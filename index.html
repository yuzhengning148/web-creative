<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garfield Magnetic Marquee</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div class="grain"></div>
    <div class="cursor"></div>

    <section class="spotlight">
        <div class="spotlight-accent"></div>
        <div class="spotlight-nav">
            <p>garfield.cc</p>
            <p>github</p>
        </div>

        <div class="spotlight-marquee">
            <div class="spotlight-marquee-track">
                <div class="spotlight-marquee-item">
                    <img src="./marquee-img-1.jpg" alt="" />
                </div>
                <div class="spotlight-marquee-item">
                    <img src="./marquee-img-2.jpg" alt="" />
                </div>
                <div class="spotlight-marquee-item">
                    <img src="./marquee-img-3.jpg" alt="" />
                </div>
                <div class="spotlight-marquee-item">
                    <img src="./marquee-img-4.jpg" alt="" />
                </div>
                <div class="spotlight-marquee-item">
                    <img src="./marquee-img-5.jpg" alt="" />
                </div>
                <div class="spotlight-marquee-item">
                    <img src="./marquee-img-6.jpg" alt="" />
                </div>
            </div>
        </div>

        <div class="spotlight-content-wrapper">
            <h1>Garfield</h1>
            <div class="spotlight-divider"></div>
            <h3>Sleep well, code well</h3>
            <div class="spotlight-copy">
                <p>
                    A lazy cat who loves lasagna, hates Mondays,
                    and builds beautiful things on the web.
                </p>
                <p>
                    No rush, no fuss — just creative front-end work
                    at a comfortable pace.
                </p>
            </div>
        </div>

        <div class="spotlight-footer">
            <p>
                Eat. Sleep. Code. Repeat — one nap at a time.
            </p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
    <script type="module" src="./script.js"></script>
</body>

</html>
